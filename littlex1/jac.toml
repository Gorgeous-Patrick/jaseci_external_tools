[project]
name = "littlex1"
version = "0.1.0"
description = "A Jac project"
entry-point = "main.jac"

[run]
topology_index = true
prefetching = "ttg"
prefetch_limit = 200

[dependencies.npm]
jac-client-node = "1.0.7"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "2.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[plugins.scale.database]
shelf_db_path = ".jac/data/anchor_store.db"

[plugins.scale.kubernetes]
app_name = "littlex1"
docker_image_name = "littlex1"
namespace = "default"
container_port = 8000
node_port = 30001
mongodb_enabled = true
redis_enabled = true
docker_username = "local"

[plugins.scale.jwt]
secret = "littlex1-dev-secret-change-in-production"
algorithm = "HS256"
exp_delta_days = 7

[plugins.scale.monitoring]
enabled = true
endpoint = "/metrics"
walker_metrics = true

[serve]
docs_enabled = true
