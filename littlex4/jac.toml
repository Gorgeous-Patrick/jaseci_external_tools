[project]
name = "littlex4"
version = "0.1.0"
description = "A Jac project"
entry-point = "main.jac"

[run]
topology_index = true
prefetching = "ttg"
prefetch_limit = 18000

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[plugins.scale.database]
mongodb_uri = "mongodb://localhost:27017"
redis_url = "redis://localhost:6379"

[plugins.scale.jwt]
secret = "littlex4-dev-secret-change-in-production"
algorithm = "HS256"
exp_delta_days = 7

[plugins.scale.monitoring]
enabled = true
endpoint = "/metrics"
walker_metrics = true

[serve]
docs_enabled = true
