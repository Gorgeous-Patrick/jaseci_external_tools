[project]
name = "littlex3"
version = "0.1.0"
description = "A Jac project"
entry-point = "main.jac"

[run]
topology_index = true
prefetching = "ttg"
prefetch_limit = 1000

[dependencies.npm]
jac-client-node = "1.0.7"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "2.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[plugins.scale.database]
mongodb_uri = "mongodb://localhost:27017"
redis_url = "redis://localhost:6379"

[plugins.scale.jwt]
secret = "littlex3-dev-secret-change-in-production"
algorithm = "HS256"
exp_delta_days = 7

[plugins.scale.monitoring]
enabled = true
endpoint = "/metrics"
walker_metrics = true

[serve]
docs_enabled = true
